<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structa Quotes - Create Invoice</title>
    <!-- Netlify Identity Widget indispensable para el Login -->
    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --purple: #7c3aed;
            --purple-hover: #6d28d9;
            --dark: #0f0f16;
            --card: #1a1a2e;
            --text-muted: #a1a1aa;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, var(--card), var(--dark));
            color: white;
            padding: 20px;
            padding-bottom: 120px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin-top: 5px;
            margin-bottom: 15px;
            background: #0b0b12;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
        }

        label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-muted);
        }

        .preview-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid var(--purple);
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .preview-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.2);
        }

        .total-amount {
            font-size: 32px;
            font-weight: bold;
            color: var(--purple);
            margin: 5px 0;
        }

        .btn-pay {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-pay:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.6);
        }

        /* --- AI ROBOT ASSISTANT --- */
        .robot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards;
            animation-delay: 1s;
        }

        .robot-bubble {
            background: white;
            color: var(--dark);
            padding: 15px 20px;
            border-radius: 20px;
            border-bottom-right-radius: 5px;
            font-size: 14px;
            font-weight: 500;
            max-width: 250px;
            margin-right: -10px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: auto;
        }

        .robot-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .robot-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.6);
            cursor: pointer;
            pointer-events: auto;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        .robot-eyes {
            display: flex;
            gap: 8px;
        }

        .robot-eye {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes blink {

            0%,
            96%,
            98%,
            100% {
                transform: scaleY(1);
            }

            97%,
            99% {
                transform: scaleY(0.1);
            }
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-msg a {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Navegación y estado de autenticación -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <span style="font-weight:bold; color:var(--text-muted); font-size: 14px;">Logged in as: <span
                    id="userEmailLabel" style="color:white;">-</span></span>
            <a href="#" onclick="netlifyIdentity.logout();"
                style="color:var(--purple); font-size:12px; text-decoration:none;">Log out</a>
        </div>

        <h1>Create <span>Premium</span> Quote</h1>

        <!-- Formulario (Hidden input para guardar el email verificado de Netlify) -->
        <input id="email" type="hidden">

        <label>Company Logo (Pro Plan Only)</label>
        <input type="file" id="logoUpload" accept="image/*">

        <label>From (Company)</label> <input id="company" placeholder="Structa Inc.">
        <label>To (Client)</label> <input id="client" placeholder="Client Name">
        <label>Description</label> <input id="work" placeholder="Service description">

        <div style="display:flex; gap:15px;">
            <div style="flex:1"><label>Length (m)</label><input id="length" type="number" step="0.01" placeholder="0">
            </div>
            <div style="flex:1"><label>Width (m)</label><input id="width" type="number" step="0.01" placeholder="0">
            </div>
        </div>
        <label>Price per m² ($)</label> <input id="price" type="number" step="0.01" placeholder="0.00">

        <div class="preview-box" id="previewContainer">
            <div style="font-size:12px;color:var(--text-muted)">ESTIMATED TOTAL</div>
            <div class="total-amount" id="previewTotal">$0.00</div>
            <div style="font-size:12px;color:var(--text-muted)" id="previewArea">0 m²</div>
        </div>

        <div id="errorBox" class="error-msg"></div>

        <button class="btn-pay" id="generateBtn" onclick="generateInvoice()">Generate PDF Invoice</button>
    </div>

    <!-- UI DEL ROBOT -->
    <div class="robot-container">
        <div class="robot-bubble" id="robotMessage">Hello! I'm Structy. I'm here to help you create your first
            professional quote!</div>
        <div class="robot-icon" onclick="pokeRobot()">
            <div class="robot-eyes">
                <div class="robot-eye"></div>
                <div class="robot-eye"></div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA DEL ROBOT ---
        const robotMessage = document.getElementById('robotMessage');
        let currentTimeout;

        function speak(text, duration = 5000) {
            robotMessage.textContent = text;
            robotMessage.classList.add('visible');
            if (currentTimeout) clearTimeout(currentTimeout);
            currentTimeout = setTimeout(() => {
                robotMessage.classList.remove('visible');
            }, duration);
        }

        function pokeRobot() {
            const phrases = ["Let's win that job!", "You're doing great.", "Ready to export?", "PDFs make you look serious."];
            speak(phrases[Math.floor(Math.random() * phrases.length)]);
        }

        // --- AUTENTICACIÓN Y EXTRACCIÓN DEL EMAIL (Netlify Identity) ---
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    // Si el usuario llega a app.html sin estar logueado, lo regresamos al index
                    window.location.href = "index.html";
                } else {
                    // Si el usuario está validado, guardamos su email en el input oculto y mostramos un saludo
                    document.getElementById('email').value = user.email;
                    document.getElementById('userEmailLabel').textContent = user.email;
                    setTimeout(() => speak(`Welcome back! Let's create your quote.`, 6000), 1000);
                }
            });
            window.netlifyIdentity.on("logout", () => {
                // Si cierra sesión lo regresamos a index
                window.location.href = "index.html";
            });
        }

        // TIPS DINÁMICOS DEL ROBOT
        document.getElementById('logoUpload').addEventListener('change', () => {
            if (document.getElementById('logoUpload').files.length > 0) {
                speak("Awesome! But remember, custom logos are an exclusive feature of the Pro Plan!", 5000);
            }
        });
        document.getElementById('client').addEventListener('input', (e) => {
            if (e.target.value.length === 2 && !window.hasGreetedClient) {
                window.hasGreetedClient = true;
                speak("Make sure the client's name is spelled correctly. It shows attention to detail!", 4000);
            }
        });

        // --- CÁLCULO EN VIVOS ---
        const inputs = ['length', 'width', 'price'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

        function updatePreview() {
            const l = parseFloat(document.getElementById('length').value) || 0;
            const w = parseFloat(document.getElementById('width').value) || 0;
            const p = parseFloat(document.getElementById('price').value) || 0;

            const area = (l * w);
            const total = area * p;

            document.getElementById('previewTotal').textContent = "$" + total.toFixed(2);
            document.getElementById('previewArea').textContent = area.toFixed(2) + " m²";

            if (total > 0 && !window.hasSeenCalc) {
                window.hasSeenCalc = true;
                const pBox = document.getElementById('previewContainer');
                pBox.style.borderColor = "#a78bfa";
                pBox.style.boxShadow = "0 0 15px rgba(124, 58, 237, 0.4)";
                setTimeout(() => { pBox.style.boxShadow = "none"; pBox.style.borderColor = "var(--purple)"; }, 1000);
                speak(`Perfect! The automatic calculation is ${area.toFixed(2)} m² for a total of $${total.toFixed(2)}.`, 4000);
            }
        }

        // --- SOLICITUD AL BACKEND Y DESCARGA DEL PDF ---
        async function generateInvoice() {
            // Obtenemos el correo valioso extraído gracias al widget de Netlify
            const email = document.getElementById('email').value;
            const client = document.getElementById('client').value;
            const l = document.getElementById('length').value;
            const w = document.getElementById('width').value;
            const p = document.getElementById('price').value;

            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';

            // Validar campos faltantes
            if (!email || !client || !l || !w || !p) {
                speak("Hmm, I think you missed some required fields. Please fill them out!", 4000);
                robotMessage.style.color = "#ef4444";
                setTimeout(() => robotMessage.style.color = "", 4000);
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.textContent = "Generating...";
            btn.disabled = true;
            speak("Processing your PDF... checking limitations...", 3000);

            // FormData compila todos los datos y el archivo (logo)
            const formData = new FormData();
            formData.append('email', email);
            formData.append('company', document.getElementById('company').value);
            formData.append('client', client);
            formData.append('work', document.getElementById('work').value);
            formData.append('length', l);
            formData.append('width', w);
            formData.append('price', p);

            const logoFile = document.getElementById('logoUpload').files[0];
            if (logoFile) {
                formData.append('logo', logoFile);
            }

            try {
                // Enviar llamada a nuestra Serverless Function de Netlify (Ruta corregida)
                const response = await fetch('/.netlify/functions/api/generate-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    let errorData;
                    try { errorData = await response.json(); } catch (e) { }

                    // Aquí atrapamos el error si subió logo y no es Pro
                    if (response.status === 403 && errorData?.error === "ProFeatureLogo") {
                        speak("Oops! Custom logos are for Pro users. Let's upgrade!", 6000);
                        errorBox.innerHTML = `Uploading a custom logo is an exclusive feature of the <b>Pro Plan</b>. Please remove the logo or <a href="index.html#pricing">Upgrade to Pro</a>.`;
                        errorBox.style.display = 'block';
                    }
                    // Aquí atrapamos el error si su límite de 3 PDFs llega a su fin en la Base de Datos
                    else if (response.status === 403 && errorData?.error === "LimitReached") {
                        speak("Oh no! You've used your 3 free quotes limit.", 6000);
                        errorBox.innerHTML = `You have reached the free limit of 3 quotes per month. <a href="index.html#pricing">View our plans</a> for unlimited access.`;
                        errorBox.style.display = 'block';
                    } else {
                        throw new Error("Server error.");
                    }
                } else {
                    // ¡Todo salió bien! Leemos cuántos quotes le quedan de los headers enviados por el server
                    const remainingQuotesHeader = response.headers.get('X-Remaining-Quotes');
                    if (remainingQuotesHeader === '1') {
                        // Structy avisa que queda 1 quote
                        speak("Heads up! You only have 1 free quote left this month. Consider subscribing!", 7000);
                    } else {
                        speak("Success! Your quote has been downloaded. Go close that job!", 5000);
                    }

                    // Descargamos directamente el archivo binario enviado por PDFKit.
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Quote_${client.replace(/\s+/g, '_')}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                }
            } catch (err) {
                console.error(err);
                speak("Sorry, I couldn't reach the server. Please try again.", 5000);
            }

            btn.textContent = "Generate PDF Invoice";
            btn.disabled = false;
        }
    </script>
</body>

</html>
