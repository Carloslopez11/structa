<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Structa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Ingresa a tu cuenta de Structa">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg-midnight: #0A0F24;
      --card-bg: #121A38;
      --violet: #8B5CF6;
      --cyan-glow: #2DD4BF;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --border-glass: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(18, 26, 56, 0.6);
    }
    
    body {
      margin: 0;
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-midnight);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.03), transparent 25%);
      background-attachment: fixed;
      background-size: cover;
    }

    .login-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--border-glass);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(139, 92, 246, 0.15);
      text-align: center;
      position: relative;
      z-index: 10;
      animation: fadeUp 0.6s ease-out forwards;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
      color: var(--text-main);
    }
    
    .logo span { color: var(--violet); }
    
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-glass);
      border-radius: 10px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: var(--violet);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
      background: rgba(0, 0, 0, 0.3);
    }
    
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--violet) 0%, #6D28D9 100%);
      color: #fff;
      padding: 15px;
      border: none;
      border-radius: 10px;
      border: 1px solid rgba(167, 139, 250, 0.3);
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
      margin-top: 10px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4), 0 0 15px rgba(45, 212, 191, 0.2);
      border-color: var(--cyan-glow);
    }
    
    .btn:disabled {
      background: rgba(139, 92, 246, 0.5);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border-color: transparent;
    }

    .toggle-text {
      margin-top: 25px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    
    .toggle-text button {
      background: none;
      border: none;
      color: var(--cyan-glow);
      font-family: inherit;
      font-size: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      display: inline;
      transition: color 0.3s ease;
    }
    
    .toggle-text button:hover {
      text-decoration: underline;
      color: #5EEAD4;
    }

    #msg {
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
      padding: 10px;
      border-radius: 8px;
    }
    
    .success { 
      color: var(--cyan-glow); 
      background: rgba(45, 212, 191, 0.1);
      border: 1px solid rgba(45, 212, 191, 0.2);
    }
    
    .error { 
      color: #F87171; 
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">STRUCTA<span>.</span></div>
    <div class="subtitle" id="form-subtitle">Ingresa a tu cuenta</div>

    <form id="auth-form">
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="tu@correo.com">
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" id="submit-btn">Entrar</button>
    </form>

    <div id="msg"></div>

    <div class="toggle-text">
      <span id="toggle-desc">¿No tienes cuenta?</span> 
      <button type="button" id="toggle-btn">Regístrate</button>
    </div>
  </div>

  <script>
    // Inicializa Supabase
    const SUPABASE_URL = 'https://tadjlpeifkidsghbirlj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhZGpscGVpZmtpZHNnaGJpcmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjg1MDEsImV4cCI6MjA4Nzk0NDUwMX0.laJbEwsKJTYsWy1GbV3LHma5rsixWQH-Th8K9NX_WAc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginView = true;

    // Referencias del DOM
    const formSubtitle = document.getElementById('form-subtitle');
    const submitBtn = document.getElementById('submit-btn');
    const toggleDesc = document.getElementById('toggle-desc');
    const toggleBtn = document.getElementById('toggle-btn');
    const authForm = document.getElementById('auth-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const msgBox = document.getElementById('msg');

    // Alternar entre Iniciar Sesión y Crear Cuenta
    toggleBtn.addEventListener('click', () => {
      isLoginView = !isLoginView;
      if (isLoginView) {
        formSubtitle.textContent = 'Ingresa a tu cuenta';
        submitBtn.textContent = 'Entrar';
        toggleDesc.textContent = '¿No tienes cuenta?';
        toggleBtn.textContent = 'Regístrate';
      } else {
        formSubtitle.textContent = 'Crea una cuenta nueva';
        submitBtn.textContent = 'Registrarse';
        toggleDesc.textContent = '¿Ya tienes cuenta?';
        toggleBtn.textContent = 'Inicia Sesión';
      }
      msgBox.style.display = 'none';
      passwordInput.value = '';
    });

    // Manejar envío del formulario
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Estado de carga
      submitBtn.disabled = true;
      submitBtn.textContent = isLoginView ? 'Iniciando sesión...' : 'Registrando...';

      if (isLoginView) {
        // Logica Iniciar Sesión
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          alert('Error: ' + error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Entrar';
        } else {
          // Redirigir si es exitoso
          window.location.href = 'app.html';
        }
      } else {
        // Logica Registrarse
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          alert(error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Registrarse';
        } else {
          alert('¡Cuenta creada! Por favor, revisa tu correo electrónico para confirmar tu cuenta antes de iniciar sesión.');
          // Cambiar vista a login automáticamente
          isLoginView = true;
          formSubtitle.textContent = 'Ingresa a tu cuenta';
          submitBtn.textContent = 'Entrar';
          toggleDesc.textContent = '¿No tienes cuenta?';
          toggleBtn.textContent = 'Regístrate';
          passwordInput.value = '';
          submitBtn.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
